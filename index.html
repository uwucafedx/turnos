<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos - Cybele & Raffá</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-image: url('fondo.png'); background-size: cover; background-position: center;
            background-attachment: fixed; background-repeat: no-repeat; background-color: #1a1a1a; 
            color: white; display: flex; flex-direction: column; align-items: center; 
        }
        .logo-header { width: 100%; text-align: center; padding: 30px 0; background: rgba(0,0,0,0.85); border-bottom: 2px solid #C0C0C0; }
        .logo-header img { max-width: 400px; width: 80%; }
        .contenedor { display: flex; flex-wrap: wrap; gap: 20px; width: 95%; max-width: 1200px; margin: 20px auto; padding-bottom: 50px; }
        #columna-agenda { flex: 2; min-width: 350px; background: rgba(30, 30, 30, 0.9); padding: 20px; border-radius: 15px; border: 1px solid #C0C0C0; }
        #columna-derecha { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        .tarjeta { background: rgba(30, 30, 30, 0.9); padding: 20px; border-radius: 15px; border: 1px solid #C0C0C0; }
        #calendar { background: white; padding: 10px; border-radius: 10px; color: #333; height: 700px; }
        .mapa-recuadro { width: 100%; height: 400px; border-radius: 10px; overflow: hidden; border: 1px solid #C0C0C0; margin-top: 10px; }
        .direccion-texto { font-size: 13px; color: #C0C0C0; margin-top: 10px; text-align: center; line-height: 1.4; }
        .info-reserva ul { list-style: none; padding: 0; margin: 10px 0; font-size: 14px; color: #C0C0C0; }
        .info-reserva li { margin-bottom: 8px; position: relative; padding-left: 20px; }
        .info-reserva li::before { content: "•"; color: #ff4d4d; position: absolute; left: 0; font-weight: bold; }
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { background: #222; padding: 30px; border-radius: 20px; border: 2px solid #C0C0C0; text-align: center; width: 90%; max-width: 400px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 15px 0; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; font-size: 16px; transition: 0.3s; }
        .btn-cybele { background: #fdfdfd; color: #333; }
        .btn-raffa { background: #333; color: #C0C0C0; border: 1px solid #C0C0C0; }
    </style>
</head>
<body>

    <header class="logo-header">
        <img src="logos.png" alt="Cybele & Raffá">
    </header>

    <div class="contenedor">
        <div id="columna-agenda">
            <h2 style="text-align:center; color:#C0C0C0; margin-top:0;">RESERVÁ TU TURNO</h2>
            <div id="calendar"></div>
        </div>

        <div id="columna-derecha">
            <div class="tarjeta">
                <h3 style="text-align:center; color:#C0C0C0; margin:0;">UBICACIÓN</h3>
                <div class="mapa-recuadro">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d204.27580424569814!2d-67.65651046376273!3d-34.996368641466404!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses!2sar!4v1773008511313!5m2!1ses!2sar" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
                <div class="direccion-texto">
                    📍 Diagonal Carlos Pellegrini, Centenario y local 2,<br>
                    M5620 Colonia Alvear, Mendoza (Alvear Oeste).
                </div>
            </div>

            <div class="tarjeta info-reserva">
                <h3 style="text-align:center; color:#C0C0C0; margin:0;">INFO DE RESERVA</h3>
                <ul>
                    <li>Buscá un horario vacío en el calendario.</li>
                    <li>Hacé clic sobre el horario que quieras.</li>
                    <li>Elegí el servicio y confirmá por WhatsApp.</li>
                </ul>
            </div>
        </div>
    </div>

    <div id="miModal" class="modal">
        <div class="modal-content">
            <h3 id="txtFecha" style="color:#C0C0C0; margin-bottom: 20px;">Servicio</h3>
            <button class="btn btn-cybele" onclick="enviarWhatsApp('Cybele')">PELUQUERÍA Cybele</button>
            <button class="btn btn-raffa" onclick="enviarWhatsApp('Raffá')">BARBERÍA Raffá</button>
            <button onclick="document.getElementById('miModal').style.display='none'" style="background:none; color:#ff4d4d; border:none; cursor:pointer; margin-top:10px; font-weight:bold;">Cancelar</button>
        </div>
    </div>

    <script>
        let datosTurno = { fecha: '', hora: '' };

        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                locale: 'es',
                timeZone: 'UTC', 
                allDaySlot: false,
                slotMinTime: '08:00:00',
                slotMaxTime: '21:00:00',
                slotDuration: '00:30:00',
                slotLabelFormat: { hour: '2-digit', minute: '2-digit', hour12: false },
                hiddenDays: [0], 
                selectable: true,
                headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                
                events: function(info, successCallback, failureCallback) {
                    var url = 'https://script.google.com/macros/s/AKfycbxbW2q9y85eGpJKXNECda9r_bdJDg6Er1Pk9Ic7CXhqaKT7-v3CBnaOyVTDzaok0skH/exec';
                    fetch(url + '?t=' + new Date().getTime())
                        .then(response => response.json())
                        .then(data => {
                            const eventosProcesados = data.map(event => {
                                // Limpiamos cualquier residuo de segundos o desfases
                                let startLimpio = event.start.substring(0, 16);
                                return {
                                    title: event.title,
                                    start: startLimpio,
                                    color: '#ff4d4d'
                                };
                            });
                            successCallback(eventosProcesados);
                        })
                        .catch(error => failureCallback(error));
                },

                select: function(info) {
                    datosTurno.fecha = info.startStr.split("T")[0];
                    datosTurno.hora = info.start.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'UTC'});
                    document.getElementById('txtFecha').innerText = "Turno para el " + datosTurno.fecha + " a las " + datosTurno.hora;
                    document.getElementById('miModal').style.display = "flex";
                }
            });
            calendar.render();
        });

        function enviarWhatsApp(servicio) {
            let numero = (servicio === 'Cybele') ? "5492625464538" : "5492625451485";
            let mensaje = "Hola! Me gustaría reservar un turno para " + servicio + " el día " + datosTurno.fecha + " a las " + datosTurno.hora;
            window.open("https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje));
            document.getElementById('miModal').style.display = "none";
        }
    </script>
</body>
</html>
