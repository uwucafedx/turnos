<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos - Cybele & Raffá</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; }
        .logo-header { width: 100%; text-align: center; padding: 30px 0; background: rgba(0,0,0,0.8); border-bottom: 2px solid #C0C0C0; }
        .logo-header img { max-width: 400px; width: 80%; }
        .contenedor { display: flex; flex-wrap: wrap; gap: 20px; width: 95%; max-width: 1200px; margin: 20px auto; padding-bottom: 50px; }
        #columna-agenda { flex: 2; min-width: 350px; background: #2b2b2b; padding: 20px; border-radius: 15px; border: 1px solid #C0C0C0; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #columna-derecha { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        .tarjeta { background: #2b2b2b; padding: 20px; border-radius: 15px; border: 1px solid #C0C0C0; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #calendar { background: white; padding: 10px; border-radius: 10px; color: #333; height: 700px; }
        .mapa-recuadro { width: 100%; height: 350px; border-radius: 10px; overflow: hidden; border: 1px solid #C0C0C0; margin-top: 15px; }
        /* Estilos del Modal */
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { background: #222; padding: 30px; border-radius: 20px; border: 2px solid #C0C0C0; text-align: center; width: 90%; max-width: 400px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 15px 0; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; font-size: 16px; transition: 0.3s; }
        .btn-cybele { background: #fdfdfd; color: #333; }
        .btn-raffa { background: #333; color: #C0C0C0; border: 1px solid #C0C0C0; }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
    </style>
</head>
<body>

    <header class="logo-header">
        <img src="logos.png" alt="Cybele & Raffá">
    </header>

    <div class="contenedor">
        <div id="columna-agenda">
            <h2 style="text-align:center; color:#C0C0C0; margin-top:0;">RESERVÁ TU TURNO</h2>
            <div id="calendar"></div>
        </div>

        <div id="columna-derecha">
            <div class="tarjeta">
                <h3 style="text-align:center; color:#C0C0C0; margin:0;">NUESTRA UBICACIÓN</h3>
                <div class="mapa-recuadro">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3238.44123456789!2d-67.6894!3d-35.0000!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzXCsDAwJzAwLjAiUyA2N8KwNDEnMjEuOCJX!5e0!3m2!1ses!2sar!4v1710000000000!5m2!1ses!2sar" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
                <p style="text-align: center; font-size: 14px; margin-top: 15px; color:#C0C0C0; line-height: 1.4;">
                    📍 Diagonal Carlos Pellegrini y Centenario,<br>Local 2, Alvear Oeste (M5620).
                </p>
            </div>
            
            <div class="tarjeta">
                <h4 style="text-align:center; color:#C0C0C0; margin:0;">¿CÓMO RESERVAR?</h4>
                <ul style="font-size: 13px; color: #ccc; padding-left: 20px;">
                    <li>Elegí un horario disponible en blanco.</li>
                    <li>Seleccioná el servicio (Peluquería o Barbería).</li>
                    <li>Confirmá el mensaje por WhatsApp.</li>
                </ul>
            </div>
        </div>
    </div>

    <div id="miModal" class="modal">
        <div class="modal-content">
            <h3 id="txtFecha" style="color:#C0C0C0; margin-bottom: 20px;">Elegí el servicio</h3>
            <button class="btn btn-cybele" onclick="enviarWhatsApp('Cybele')">PELUQUERÍA Cybele</button>
            <button class="btn btn-raffa" onclick="enviarWhatsApp('Raffá')">BARBERÍA Raffá</button>
            <button onclick="document.getElementById('miModal').style.display='none'" style="background:none; color:#ff4d4d; border:none; cursor:pointer; margin-top:10px; font-weight:bold;">Cerrar</button>
        </div>
    </div>

    <script>
        let datosTurno = { fecha: '', hora: '' };

        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                locale: 'es',
                allDaySlot: false,
                slotMinTime: '08:00:00',
                slotMaxTime: '21:00:00',
                slotDuration: '00:30:00',
                hiddenDays: [0], // Salta los domingos
                selectable: true,
                headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                
                events: function(info, successCallback, failureCallback) {
                    // LINK DE TU APPS SCRIPT
                    var url = 'https://script.google.com/macros/s/AKfycbz4mOlzI8bJtyFBj-7NGN_akyxmlDle3JwTQv0ieYGjnrYF-f72tWvJ9zlGqSeTaVQ/exec';
                    fetch(url + '?t=' + new Date().getTime())
                        .then(response => response.json())
                        .then(data => successCallback(data))
                        .catch(error => failureCallback(error));
                },

                select: function(info) {
                    datosTurno.fecha = info.startStr.split("T")[0];
                    datosTurno.hora = info.start.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
                    
                    document.getElementById('txtFecha').innerText = "Turno para el " + datosTurno.fecha + " a las " + datosTurno.hora;
                    document.getElementById('miModal').style.display = "flex";
                }
            });
            calendar.render();
        });

        function enviarWhatsApp(servicio) {
            let numero = (servicio === 'Cybele') ? "5492625464538" : "5492625451485";
            let mensaje = "Hola! Me gustaría reservar un turno para " + servicio + " el día " + datosTurno.fecha + " a las " + datosTurno.hora;
            window.open("https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje));
            document.getElementById('miModal').style.display = "none";
        }
    </script>
</body>
</html>
