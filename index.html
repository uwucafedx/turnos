<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Turnos</title>
    <style>
        /* Estilos de Fondo y Cuerpo */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('fondo.png'); /* Tu archivo de fondo */
            background-attachment: fixed;
            background-size: auto;
            background-repeat: repeat;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Contenedor de Logos */
        .logo-header {
            width: 100%;
            text-align: center;
            padding: 40px 0;
            background: rgba(0, 0, 0, 0.4); /* Sombra suave para que el logo resalte */
        }

        .logo-mid {
            text-align: center;
            margin: 60px 0;
        }

        img {
            max-width: 350px; /* Ajusta el tamaño de tus logos aquí */
            height: auto;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5));
        }

        /* Tarjeta de Contenido / Reservas */
        .main-container {
            background-color: rgba(43, 43, 43, 0.95); /* Gris oscuro semi-transparente */
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #C0C0C0; /* Borde plateado */
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #C0C0C0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-reserva {
            background-color: #f2f2f2;
            color: #333;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-reserva:hover {
            background-color: #C0C0C0;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header class="logo-header">
        <img src="logos.png" alt="Logo Superior">
    </header>

    <main class="main-container">
        <h1>Reserva tu Turno</h1>
        <p>Selecciona el servicio de barbería o estética para agendar tu cita.</p>
        
        <div id="booking-system">
            <a href="#" class="btn-reserva">VER DISPONIBILIDAD</a>
        </div>
    </main>

    <section class="logo-mid">
        <img src="logos.png" alt="Logo Inferior" style="max-width: 250px;">
    </section>

    <footer style="margin-bottom: 20px; font-size: 0.8em; opacity: 0.7;">
        © 2026 - Gestión de Turnos Profesional
    </footer>

</body>
</html>
