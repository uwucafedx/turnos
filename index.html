<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peluquería y Estética Cybele Mendoza & Raffá Barbería</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('fondo.png');
            background-attachment: fixed;
            background-size: auto;
            background-repeat: repeat;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-header {
            width: 100%;
            text-align: center;
            padding: 30px 0;
            background: rgba(0, 0, 0, 0.5);
        }

        img {
            max-width: 320px;
            height: auto;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5));
        }

        #calendar-container {
            background-color: rgba(43, 43, 43, 0.95);
            width: 95%;
            max-width: 900px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #C0C0C0;
            margin: 20px 0;
        }

        h2 {
            text-align: center;
            color: #C0C0C0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 400;
        }

        #calendar {
            background: white;
            padding: 15px;
            border-radius: 10px;
            color: #333;
        }

        /* Estilo para los botones del calendario */
        .fc { --fc-button-bg-color: #333; --fc-button-border-color: #C0C0C0; }
        .fc-event { cursor: not-allowed; opacity: 0.7; }
        
        /* Ocultar el domingo por CSS por seguridad visual */
        .fc-day-sun { display: none !important; }

        .footer-logo {
            margin: 40px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <header class="logo-header">
        <img src="logos.png" alt="Logo Superior">
    </header>

    <div id="calendar-container">
        <h2> AGENDÁ TU TURNO </h2>
        <div id="calendar"></div>
    </div>

    <div class="footer-logo">
        <img src="logos.png" alt="Logo Inferior" style="max-width: 200px;">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridDay',
                locale: 'es',
                allDaySlot: false,
                slotMinTime: '08:00:00',
                slotMaxTime: '20:00:00',
                slotDuration: '00:30:00',
                selectable: true,
                hiddenDays: [0], // 0 es Domingo, lo quitamos por completo
                
                // Formato de hora AM/PM
                slotLabelFormat: {
                    hour: 'numeric',
                    minute: '2-digit',
                    omitZeroMinute: false,
                    meridiem: 'short'
                },
                eventTimeFormat: {
                    hour: 'numeric',
                    minute: '2-digit',
                    meridiem: 'short'
                },

                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'timeGridDay,timeGridWeek'
                },
                
                events: 'https://script.google.com/macros/s/AKfycbwxsXF1J3OTCUpLs0378nFHCjArpQcatUsUj9ZlLTyqEdespDUDo3ct3DGeG3XUA2kW/exec', 
                
                businessHours: [
                    { daysOfWeek: [ 1, 2, 3, 4, 5 ], startTime: '08:00', endTime: '12:00' },
                    { daysOfWeek: [ 1, 2, 3, 4, 5 ], startTime: '14:00', endTime: '20:00' },
                    { daysOfWeek: [ 6 ], startTime: '09:00', endTime: '12:00' },
                    { daysOfWeek: [ 6 ], startTime: '14:00', endTime: '20:00' }
                ],
                
                selectConstraint: 'businessHours',

                select: function(info) {
                    let fecha = info.startStr.split("T")[0];
                    let hora = info.start.toLocaleTimeString([], {hour: 'numeric', minute:'2-digit', hour12: true});
                    
                    // Cuadro de elección personalizado
                    let eleccion = confirm("Seleccionaste el día " + fecha + " a las " + hora + ".\n\n¿Es para Peluquería/Estética?\n(Presiona ACEPTAR para Estética o CANCELAR para Barbería)");
                    
                    if(eleccion) {
                        // Número Estética Cybele
                        window.open("https://wa.me/5492625464538?text=Hola! Quiero reservar un turno de ESTÉTICA/PELUQUERÍA para el día " + fecha + " a las " + hora);
                    } else {
                        // Número Barbería Raffá
                        window.open("https://wa.me/5492625451485?text=Hola! Quiero reservar un turno de BARBERÍA para el día " + fecha + " a las " + hora);
                    }
                    calendar.unselect();
                }
            });
            calendar.render();
        });
    </script>

</body>
</html>
