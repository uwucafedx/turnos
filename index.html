<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos - Cybele & Raffá</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        /* --- ESTILO GENERAL --- */
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('fondo.png');
            background-attachment: fixed;
            background-size: auto;
            background-repeat: repeat;
            color: #ffffff;
            display: flex; flex-direction: column; align-items: center;
        }

        .logo-header { width: 100%; text-align: center; padding: 40px 0; background: rgba(0, 0, 0, 0.5); }
        .logo-header img { max-width: 500px; width: 85%; height: auto; filter: drop-shadow(0px 4px 12px rgba(0,0,0,0.6)); }

        /* --- CONTENEDOR DE DOS COLUMNAS --- */
        .contenedor-principal {
            display: flex;
            flex-wrap: wrap; /* Para que en el celular se ponga uno abajo del otro */
            gap: 20px;
            width: 95%;
            max-width: 1200px;
            margin: 20px auto 60px auto;
        }

        /* Columna Izquierda (Calendario) */
        #columna-agenda {
            flex: 2;
            min-width: 350px;
            background-color: rgba(43, 43, 43, 0.95);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #C0C0C0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Columna Derecha (Mapa y Galería) */
        #columna-derecha {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .tarjeta-info {
            background-color: rgba(43, 43, 43, 0.95);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #C0C0C0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        h2, h3 { text-align: center; color: #C0C0C0; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; }

        #calendar { background: white; padding: 15px; border-radius: 10px; color: #333; }

        /* --- ESTILOS DE BLOQUEO --- */
        .fc-v-event { background-color: #d32f2f !important; border: none !important; display: flex !important; align-items: center !important; justify-content: center !important; }
        .texto-bloqueo { color: white !important; font-weight: 800 !important; font-size: 11px !important; text-align: center; text-transform: uppercase; }
        .fc-nonbusiness { background-color: rgba(180, 180, 180, 0.5) !important; display: flex !important; align-items: center !important; justify-content: center !important; position: relative; }
        .fc-nonbusiness::after { content: "CERRADO"; color: #444; font-size: 10px; font-weight: bold; position: absolute; }
        .fc-day-sun { display: none !important; }

        /* --- MAPA Y GALERÍA --- */
        .mapa-recuadro { width: 100%; height: 250px; border-radius: 15px; overflow: hidden; border: 1px solid #C0C0C0; }
        .galeria { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .galeria img { width: 100%; height: 110px; object-fit: cover; border-radius: 10px; border: 1px solid #C0C0C0; transition: 0.3s; cursor: pointer; }
        .galeria img:hover { transform: scale(1.05); border-color: #fff; }

        /* --- MODAL DE RESERVA --- */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background-color: #2b2b2b; padding: 30px; border-radius: 20px; border: 2px solid #C0C0C0; text-align: center; width: 90%; max-width: 400px; }
        .btn-opcion { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-estetica { background-color: #e0e0e0; color: #333; }
        .btn-barberia { background-color: #333; color: #C0C0C0; border: 1px solid #C0C0C0; }
        .btn-cancelar { background: none; color: #ff5555; cursor: pointer; border: none; text-decoration: underline; margin-top: 15px; }
    </style>
</head>
<body>

    <header class="logo-header">
        <img src="logos.png" alt="Cybele & Raffá">
    </header>

    <div class="contenedor-principal">
        
        <div id="columna-agenda">
            <h2> AGENDÁ TU TURNO </h2>
            <div id="calendar"></div>
        </div>

        <div id="columna-derecha">
            
            <div class="tarjeta-info">
                <h3>UBICACIÓN</h3>
                <div class="mapa-recuadro">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3350.551717838634!2d-68.8354!3d-32.859!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzLCsDUxJzMyLjQiUyA2OMKwNTAnMDcuNCJX!5e0!3m2!1ses!2sar!4v1700000000000" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
                <p style="text-align: center; font-size: 13px; margin-top: 10px; color: #aaa;">📍 Gral. Roca 817, Las Heras, Mendoza.</p>
            </div>

            <div class="tarjeta-info">
                <h3>NUESTROS TRABAJOS</h3>
                <div class="galeria">
                    <img src="https://via.placeholder.com/200x200?text=Peluquería" alt="Trabajo 1">
                    <img src="https://via.placeholder.com/200x200?text=Barbería" alt="Trabajo 2">
                    <img src="https://via.placeholder.com/200x200?text=Estética" alt="Trabajo 3">
                    <img src="https://via.placeholder.com/200x200?text=Estilo" alt="Trabajo 4">
                </div>
                <p style="text-align: center; font-size: 12px; margin-top: 15px; color: #aaa;">Seguinos en redes para ver más.</p>
            </div>

        </div>
    </div>

    <div id="miModal" class="modal">
        <div class="modal-content">
            <h3 id="fechaSeleccionada" style="color: #C0C0C0;">Elegí tu servicio</h3>
            <button class="btn-opcion btn-estetica" onclick="enviarWhatsApp('estetica')">PELUQUERÍA Y ESTÉTICA Cybele</button>
            <button class="btn-opcion btn-barberia" onclick="enviarWhatsApp('barberia')">BARBERÍA Raffá</button>
            <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>

    <script>
        let datosReserva = { fecha: '', hora: '' };

        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                locale: 'es',
                allDaySlot: false,
                slotMinTime: '08:00:00',
                slotMaxTime: '21:30:00',
                slotDuration: '00:30:00',
                selectable: true,
                hiddenDays: [0],
                slotLabelFormat: { hour: 'numeric', minute: '2-digit', hour12: true, meridiem: 'short' },
                headerToolbar: { 
                    left: 'prev,next today', 
                    center: 'title', 
                    right: 'dayGridMonth,timeGridWeek,timeGridDay' 
                },
                
                // --- CONEXIÓN AL EXCEL CON FILTRO ANTI-CACHÉ ---
                events: function(fetchInfo, successCallback, failureCallback) {
                    var scriptURL = 'https://script.google.com/macros/s/AKfycbxSzBoPxdYPQ6eiskuhra5upZ1W04cQ6rqIIVpDaVAR6P1VYJejkCOjXTdQbIBRBIzZ/exec';
                    fetch(scriptURL + '?t=' + new Date().getTime())
                        .then(response => response.json())
                        .then(data => {
                            // Filtramos para que solo aparezcan turnos con cliente anotado
                            let ocupados = data.filter(e => e.title && e.title.trim() !== "" && e.title !== "null");
                            successCallback(ocupados);
                        })
                        .catch(error => failureCallback(error));
                },
                
                eventContent: function(arg) {
                    return { html: '<div class="texto-bloqueo">NO DISPONIBLE</div>' };
                },

                // HORARIOS DE DANA
                businessHours: [
                    { daysOfWeek: [ 1, 2, 3, 4, 5 ], startTime: '14:00', endTime: '20:00' }, 
                    { daysOfWeek: [ 6 ], startTime: '09:00', endTime: '12:00' },
                    { daysOfWeek: [ 6 ], startTime: '14:00', endTime: '21:00' }
                ],
                
                selectConstraint: 'businessHours',

                select: function(info) {
                    if (calendar.view.type === 'dayGridMonth') {
                        calendar.changeView('timeGridDay', info.startStr);
                    } else {
                        datosReserva.fecha = info.startStr.split("T")[0];
                        datosReserva.hora = info.start.toLocaleTimeString([], {hour: 'numeric', minute:'2-digit', hour12: true});
                        document.getElementById('fechaSeleccionada').innerText = "Turno: " + datosReserva.fecha + " a las " + datosReserva.hora;
                        document.getElementById('miModal').style.display = "flex";
                        calendar.unselect();
                    }
                }
            });
            calendar.render();
        });

        function cerrarModal() { document.getElementById('miModal').style.display = "none"; }

        function enviarWhatsApp(tipo) {
            let numero = (tipo === 'estetica') ? "5492625464538" : "5492625451485";
            let servicio = (tipo === 'estetica') ? "ESTÉTICA/PELUQUERÍA" : "BARBERÍA";
            let mensaje = "Hola! Quiero reservar un turno de " + servicio + " para el día " + datosReserva.fecha + " a las " + datosReserva.hora;
            window.open("https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje));
            cerrarModal();
        }
    </script>
</body>
</html>
