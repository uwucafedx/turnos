<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Turnos - Peluquería y Estética Cybele Mendoza & Raffá Barbería</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('fondo.png');
            background-attachment: fixed;
            background-size: auto;
            background-repeat: repeat;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-header {
            width: 100%;
            text-align: center;
            padding: 50px 0;
            background: rgba(0, 0, 0, 0.5);
        }

        .logo-header img {
            max-width: 550px;
            width: 90%;
            height: auto;
            filter: drop-shadow(0px 4px 12px rgba(0,0,0,0.6));
        }

        #calendar-container {
            background-color: rgba(43, 43, 43, 0.95);
            width: 95%;
            max-width: 900px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #C0C0C0;
            margin: 20px 0 60px 0;
        }

        h2 {
            text-align: center;
            color: #C0C0C0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 400;
        }

        #calendar {
            background: white;
            padding: 15px;
            border-radius: 10px;
            color: #333;
        }

        /* Estilos del Menú Desplegable (Modal) */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #2b2b2b;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #C0C0C0;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(192, 192, 192, 0.3);
        }

        .modal-content h3 {
            color: #C0C0C0;
            margin-bottom: 25px;
        }

        .btn-opcion {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-estetica { background-color: #e0e0e0; color: #333; }
        .btn-barberia { background-color: #333; color: #C0C0C0; border: 1px solid #C0C0C0; }

        .btn-opcion:hover { transform: scale(1.05); }

        .btn-cancelar {
            margin-top: 15px;
            background: none;
            color: #ff5555;
            cursor: pointer;
            border: none;
            text-decoration: underline;
        }

        /* Ocultar domingos */
        .fc-day-sun { display: none !important; }
    </style>
</head>
<body>

    <header class="logo-header">
        <img src="logos.png" alt="Cybele Mendoza y Raffá Barbería">
    </header>

    <div id="calendar-container">
        <h2> AGENDÁ TU TURNO </h2>
        <div id="calendar"></div>
    </div>

    <div id="miModal" class="modal">
        <div class="modal-content">
            <h3 id="fechaSeleccionada">Elegí tu servicio</h3>
            <button class="btn-opcion btn-estetica" onclick="enviarWhatsApp('estetica')">PELUQUERÍA Y ESTÉTICA (Cybele)</button>
            <button class="btn-opcion btn-barberia" onclick="enviarWhatsApp('barberia')">BARBERÍA (Raffá)</button>
            <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>

    <script>
        let datosReserva = { fecha: '', hora: '' };

        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridDay',
                locale: 'es',
                allDaySlot: false,
                slotMinTime: '08:00:00',
                slotMaxTime: '20:00:00',
                slotDuration: '00:30:00',
                selectable: true,
                hiddenDays: [0],
                slotLabelFormat: { hour: 'numeric', minute: '2-digit', hour12: true, meridiem: 'short' },
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'timeGridDay,timeGridWeek' },
                
                events: 'https://script.google.com/macros/s/AKfycbwxsXF1J3OTCUpLs0378nFHCjArpQcatUsUj9ZlLTyqEdespDUDo3ct3DGeG3XUA2kW/exec', 
                businessHours: [
                    { daysOfWeek: [ 1, 2, 3, 4, 5 ], startTime: '08:00', endTime: '12:00' },
                    { daysOfWeek: [ 1, 2, 3, 4, 5 ], startTime: '14:00', endTime: '20:00' },
                    { daysOfWeek: [ 6 ], startTime: '09:00', endTime: '12:00' },
                    { daysOfWeek: [ 6 ], startTime: '14:00', endTime: '20:00' }
                ],
                selectConstraint: 'businessHours',

                select: function(info) {
                    datosReserva.fecha = info.startStr.split("T")[0];
                    datosReserva.hora = info.start.toLocaleTimeString([], {hour: 'numeric', minute:'2-digit', hour12: true});
                    
                    document.getElementById('fechaSeleccionada').innerText = "Turno: " + datosReserva.fecha + " a las " + datosReserva.hora;
                    document.getElementById('miModal').style.display = "flex";
                    calendar.unselect();
                }
            });
            calendar.render();
        });

        function cerrarModal() {
            document.getElementById('miModal').style.display = "none";
        }

        function enviarWhatsApp(tipo) {
            let numero, mensaje;
            if(tipo === 'estetica') {
                numero = "5492625464538";
                mensaje = "Hola! Quiero reservar un turno de ESTÉTICA/PELUQUERÍA para el día " + datosReserva.fecha + " a las " + datosReserva.hora;
            } else {
                numero = "5492625451485";
                mensaje = "Hola! Quiero reservar un turno de BARBERÍA para el día " + datosReserva.fecha + " a las " + datosReserva.hora;
            }
            window.open("https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje));
            cerrarModal();
        }
    </script>

</body>
</html>
