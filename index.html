<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos - Cybele & Raffá</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('fondo.png');
            background-attachment: fixed;
            background-size: cover;
            background-repeat: no-repeat;
            color: #ffffff;
            display: flex; flex-direction: column; align-items: center;
        }

        .logo-header { width: 100%; text-align: center; padding: 40px 0; background: rgba(0, 0, 0, 0.6); }
        .logo-header img { max-width: 450px; width: 80%; height: auto; filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.7)); }

        .contenedor-principal {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 95%;
            max-width: 1200px;
            margin: 20px auto 60px auto;
        }

        #columna-agenda {
            flex: 2;
            min-width: 350px;
            background-color: rgba(30, 30, 30, 0.9);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #C0C0C0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        #columna-derecha {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .tarjeta-info {
            background-color: rgba(30, 30, 30, 0.9);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #C0C0C0;
        }

        h2, h3 { text-align: center; color: #C0C0C0; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; }
        #calendar { background: white; padding: 15px; border-radius: 12px; color: #333; }

        .fc-v-event { background-color: #d32f2f !important; border: none !important; display: flex !important; align-items: center !important; justify-content: center !important; }
        .texto-bloqueo { color: white !important; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .fc-day-sun { display: none !important; }

        .mapa-recuadro { width: 100%; height: 400px; border-radius: 15px; overflow: hidden; border: 1px solid #C0C0C0; }

        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; }
        .modal-content { background: #222; padding: 30px; border-radius: 20px; border: 2px solid #C0C0C0; text-align: center; width: 90%; max-width: 380px; }
        .btn-opcion { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-estetica { background-color: #f0f0f0; color: #222; }
        .btn-barberia { background-color: #333; color: #C0C0C0; border: 1px solid #C0C0C0; }
        .btn-cancelar { background: none; color: #ff4444; border: none; cursor: pointer; text-decoration: underline; margin-top: 15px; }
    </style>
</head>
<body>

    <header class="logo-header">
        <img src="logos.png" alt="Cybele & Raffá">
    </header>

    <div class="contenedor-principal">
        <div id="columna-agenda">
            <h2> AGENDÁ TU TURNO </h2>
            <div id="calendar"></div>
        </div>

        <div id="columna-derecha">
            <div class="tarjeta-info">
                <h3>UBICACIÓN</h3>
                <div class="mapa-recuadro">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3246.3456!2d-67.7289!3d-34.9754!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95d63795e5b32f9b%3A0x7d0a2f9b7d0a2f9b!2sAlvear%20Oeste%2C%20Mendoza!5e0!3m2!1ses!2sar!4v1700000000000" 
                        width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>
                <p style="text-align: center; font-size: 14px; margin-top: 12px; color: #C0C0C0; line-height: 1.4;">
                    📍 Local 2, Colonia Alvear.<br>
                    <strong>Alvear Oeste, Mendoza.</strong>
                </p>
            </div>
        </div>
    </div>

    <div id="miModal" class="modal">
        <div class="modal-content">
            <h3 id="fechaSeleccionada">Seleccioná un servicio</h3>
            <button class="btn-opcion btn-estetica" onclick="enviarWA('Peluquería Cybele')">PELUQUERÍA Cybele</button>
            <button class="btn-opcion btn-barberia" onclick="enviarWA('Barbería Raffá')">BARBERÍA Raffá</button>
            <button class="btn-cancelar" onclick="cerrar()">Cancelar</button>
        </div>
    </div>

    <script>
        let reserva = { f: '', h: '' };

        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                locale: 'es',
                allDaySlot: false,
                slotMinTime: '08:00:00',
                slotMaxTime: '21:00:00',
                selectable: true,
                hiddenDays: [0],
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                
                events: function(info, success, failure) {
                    var scriptURL = 'https://script.google.com/macros/s/AKfycby-Gd5UCg6tla7tzPiwUO8Yk9mIJeezKc5UN300fqP9_vFPx1QZqFS-a3GJSKA4lNbV/exec';
                    fetch(scriptURL + '?t=' + new Date().getTime())
                        .then(r => r.json())
                        .then(d => success(d))
                        .catch(e => failure(e));
                },
                
                eventContent: function() { return { html: '<div class="texto-bloqueo">OCUPADO</div>' }; },

                businessHours: [
                    { daysOfWeek: [1,2,3,4,5], startTime: '14:00', endTime: '20:00' },
                    { daysOfWeek: [6], startTime: '09:00', endTime: '12:00' },
                    { daysOfWeek: [6], startTime: '14:00', endTime: '21:00' }
                ],
                
                selectConstraint: 'businessHours',

                select: function(i) {
                    reserva.f = i.startStr.split("T")[0];
                    reserva.h = i.start.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    document.getElementById('fechaSeleccionada').innerText = "Turno: " + reserva.f + " a las " + reserva.h;
                    document.getElementById('miModal').style.display = "flex";
                }
            });
            calendar.render();
        });

        function cerrar() { document.getElementById('miModal').style.display = "none"; }
        function enviarWA(tipo) {
            let n = (tipo.includes('Cybele')) ? "5492625464538" : "5492625451485";
            let m = "Hola! Quiero reservar un turno para " + tipo + " el día " + reserva.f + " a las " + reserva.h;
            window.open("https://wa.me/" + n + "?text=" + encodeURIComponent(m));
            cerrar();
        }
    </script>
</body>
</html>
